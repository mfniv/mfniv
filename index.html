<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Stealth Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen" class="overlay">
        <div class="start-content">
            <h1>Coffee Break</h1>
            <p>Collect as many cups of coffee as you can without being spotted by the patrolling guard. Use the arrow keys to move. If the guard bumps into you three times, it's game over!</p>
            <button id="start-button">Start</button>
        </div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script src="game.js"></script>
</body>
</html>
